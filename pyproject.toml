[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = [
    "--cov=scanner/lib/scanner",
    "--cov=narrator/mcp_server",
    "--cov-report=term-missing",
    "--cov-fail-under=80",
]

[tool.coverage.run]
omit = ["tests/*", "*/pyproject.toml"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
